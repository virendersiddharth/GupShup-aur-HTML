<!DOCTYPE html>
<html lang="en">
<head>
    <title>Emphasizing content</title>
</head>
<body>
    
    <!-- Bold Text -->
    <p>Lorem ipsum <strong>dolor sit</strong> amet consectetur, adipisicing elit.</p>

    <!-- Italic text  -->
    <p>Lorem ipsum <em>dolor sit</em> amet consectetur adipisicing elit. Explicabo.</p>

    <!-- Line Break -->
    <p>Lorem ipsum dolor sit <br> amet consectetur adipisicing elit. Mollitia, veritatis?</p>

    <!-- Horizontal Rule -->
    <hr>
</body>
</html>

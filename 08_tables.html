<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <!-- table -> table container 
    tr -> table row
    th -> table heading
    td -> table data -->
    <h2>HTML Tables</h2>

    <table border="1">
        <caption>HTML table</caption>
        <!-- <tr>
            <th>Heading 1</th>
            <th>Heading 2</th>
            <th>Heading 3</th>
            <th>Heading 4</th>
        </tr> -->
        <tr>
            <td colspan="2">R1 C1</td>
            <td>R1 C2</td>
            <td>R1 C3</td>
        </tr>
        <tr>
            <td rowspan="3">R2 C1</td>
            <td>R2 C2</td>
            <td>R2 C3</td>
            <td>R2 C4</td>
        </tr>
        <tr>
            <td colspan="3">R3 C1</td>
        </tr>
        <tr>
            <td>R4 C1</td>
            <td colspan="2">R4 C2</td>
        </tr>
    </table>
</body>
</html>

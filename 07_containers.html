<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containers</title>
</head>
<body>
    <h2>HTML Containers</h2>
    <p>Lorem ipsum dolor sit amet consectetur.</p>

    <!-- Div -->
    <!-- 1. Block level container  -->
    <!-- 2. New line se start hota hai  -->
    <!-- 3. Large section ko group karta hai  -->
    <div>
        <h2>About me</h2>
        <p>I'm teaching web development.</p>
    </div>

    <!-- Span -->
    <!-- 1. Inline container  -->
    <!-- 2. Same line me hota hai  -->
    <!-- 3. small text parts group karta hai  -->
    <span>Apple</span>
    <span>Mongo</span>
    <p>This is a <span>special</span> word.</p>
</body>
</html>

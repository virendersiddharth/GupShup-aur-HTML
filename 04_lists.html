<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML lists</title>
</head>
<body>
    <!-- Unordered lists -->
    <h1>Unordered list</h1>
    <ul type="square">
        <li>Apple</li>
        <li>Mango</li>
        <li>orange</li>
    </ul>

    <!-- Ordered list -->
     <h1>Ordered list</h1>
    <ol type="i">
        <li>Ironman</li>
        <li>Batman</li>
        <li>Superman</li>
    </ol>

    <!-- Description list -->
    <!-- dl -> Description list 
    dt -> term
    dd -> description -->

    <h2>Description list or Defination list</h2>

    <dl>
        <dt>Html</dt>
        <dd>HTML is used to structure web page.</dd>

        <dt>CSS</dt>
        <dd>CSS is used to style web page.</dd>
    </dl>
</body>
</html>
